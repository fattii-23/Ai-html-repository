<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Survey Form</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #a8d0d0;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
      font-size: 45px;
    }

    .container {
      width: 80%;
      margin: 20px auto;
      background-color: #f2f2f2;
      padding: 40px;
      border-radius: 5px;
    }

    .title {
      text-align: center;
      margin-bottom: 30px;
      font-size: 22px;
    }

    .form-group {
      display: flex;
      align-items: center;
      margin-bottom: 25px;
    }

    .form-group label {
      width: 45%;
      text-align: right;
      padding-right: 20px;
      font-size: 20px;
    }

    .form-group input,
    .form-group select {
      width: 300px;
      padding: 10px;
      font-size: 16px;
    }

    .radio-group,
    .checkbox-group {
      display: flex;
      flex-direction: column;
    }

    .radio-group label,
    .checkbox-group label {
      text-align: left;
      width: auto;
      padding: 5px 0;
      font-size: 18px;
    }

    textarea {
      width: 300px;
      height: 100px;
      padding: 10px;
      font-size: 16px;
    }

    .submit-btn {
      text-align: center;
      margin-top: 30px;
    }

    button {
      background-color: #2d7d7d;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 18px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #205c5c;
    }
  </style>
</head>

<body>

  <h1>Survey Form</h1>

  <div class="container">

    <p class="title">
      Let us know how we can improve freeCodeCamp
    </p>

    <form>

      <!-- Name -->
      <div class="form-group">
        <label>* Name:</label>
        <input type="text" placeholder="Enter your name">
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>* Email:</label>
        <input type="email" placeholder="Enter your Email">
      </div>

      <!-- Age -->
      <div class="form-group">
        <label>* Age:</label>
        <input type="number" placeholder="Age">
      </div>

      <!-- Role -->
      <div class="form-group">
        <label>Which option best describes your current role?</label>

        <select>
          <option>Student</option>
          <option>Teacher</option>
          <option>Developer</option>
          <option>Other</option>
        </select>
      </div>

      <!-- Recommendation -->
      <div class="form-group">
        <label>
          * How likely is that you would recommend freeCodeCamp to a friend?
        </label>

        <div class="radio-group">
          <label>
            <input type="radio" name="recommend">
            Definitely
          </label>

          <label>
            <input type="radio" name="recommend">
            Maybe
          </label>

          <label>
            <input type="radio" name="recommend">
            Not sure
          </label>
        </div>
      </div>

      <!-- Favorite -->
      <div class="form-group">
        <label>What do you like most in FCC:</label>

        <select>
          <option>Select an option</option>
          <option>Projects</option>
          <option>Challenges</option>
          <option>Community</option>
        </select>
      </div>

      <!-- Improvements -->
      <div class="form-group">
        <label>
          Things that should be improved in the future
          (Check all that apply):
        </label>

        <div class="checkbox-group">

          <label>
            <input type="checkbox">
            Front-end Projects
          </label>

          <label>
            <input type="checkbox">
            Back-end Projects
          </label>

          <label>
            <input type="checkbox">
            Data Visualization
          </label>

          <label>
            <input type="checkbox">
            Videos
          </label>

          <label>
            <input type="checkbox">
            Community Support
          </label>

        </div>
      </div>

      <!-- Comments -->
      <div class="form-group">
        <label>Any Comments or Suggestions?</label>

        <textarea placeholder="Enter your comment here..."></textarea>
      </div>

      <!-- Button -->
      <div class="submit-btn">
        <button type="submit">Submit</button>
      </div>

    </form>

  </div>

</body>
</html>
